# NOTE: upstream Vlad with hardcoded PARAMETER num_gpu 99. Do NOT set
# OLLAMA_KV_CACHE_TYPE=q4_0 at the server level on <16 GB VRAM while this
# model is loaded - the smaller KV cache trips the placement estimator into
# honoring num_gpu=99, causing CUDA OOM and a Windows display-driver reset.
# Use gemma4-26b-vram-dynamic instead.
[llm.gemma4-26b-vram]
name = "Gemma 4 26B 16GB-VRAM (Local)"
provider = "ollama"
model_id = "VladimirGav/gemma4-26b-16GB-VRAM"
tier = 0
input_price = 0.00
output_price = 0.00
context_window = 128000
supports_effort = false
supports_vision = true
supports_caching = false

[llm.gemma4-26b-unsloth-q4kxl]
