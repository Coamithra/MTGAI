# Best long-context config on 12 GB VRAM (per TC-1f). Vlad's IQ4_XS quant +
# q8_0 KV cache + flash attention runs a 58K-token extraction in ~4 min at
# 128K context. Per-model `cache_type_k`/`cache_type_v` here replace the
# global OLLAMA_KV_CACHE_TYPE env var that Ollama forced — llama.cpp gives
# us per-server KV quant via `--cache-type-k`/`-v`. Flash attention is
# enabled by default in llama-server when the architecture supports it.
#
# WARNING: n_gpu_layers = -1 means "ALL layers on GPU" in llama.cpp, NOT
# "auto-place" like Ollama's num_gpu=-1. This config only works because
# q8_0's small KV cache (1.7 GB at 128K) leaves ~1 GB headroom (post-load
# placement = 89%). Switching to f16 KV cache OOMs the GPU mid-extraction.
# llmfacade auto-placement is a known TODO.
[llm.gemma4-26b-vram-dynamic]
name = "Gemma 4 26B Vlad IQ4_XS (Local)"
provider = "llamacpp"
model_id = "vlad-gemma4-26b-dynamic"
gguf_path = "C:/Models/vlad-gemma4-26b-dynamic.gguf"
tier = 0
input_price = 0.00
output_price = 0.00
context_window = 128000
supports_effort = false
# Gemma 4 has a vision projector, but managed-mode llamacpp here doesn't yet
# pass --mmproj at server launch. Flip to true once mmproj_path is plumbed
# through the registry + _llamacpp_new_model.
supports_vision = false
supports_caching = false
n_gpu_layers = -1
cache_type_k = "q8_0"
cache_type_v = "q8_0"

# ── TC-2 Phase D: competitor / discounted-from-Ollama candidates ─────────
# Originally we hard-linked stock Google Gemma 4 GGUFs from Ollama's blob
# cache, but llama-server rejects them with "wrong number of tensors;
# expected N, got M" — Ollama's GGUFs are the multimodal architecture
# (vision + audio tensors expected) but ship with text-only weights, and
# llama.cpp's loader is strict about the count. Only Unsloth's text-only
# repacks (and VladimirGav's, see above) are llama.cpp-compatible.
#
# Removed entries (incompatible): gemma4-26b-stock, gemma4-e4b,
# gemma4-31b-dense. See learnings/llamacpp-tc2-benchmark.md.

[llm.gemma4-26b-unsloth-q4kxl]
name = "Gemma 4 26B Unsloth UD-Q4_K_XL (Local)"
provider = "llamacpp"
model_id = "gemma4-26b-unsloth-q4kxl"
gguf_path = "C:/Models/gemma4-26b-unsloth-q4kxl.gguf"
tier = 0
input_price = 0.00
output_price = 0.00
context_window = 128000
supports_effort = false
supports_vision = false
supports_caching = false
n_gpu_layers = 35
cache_type_k = "q8_0"
cache_type_v = "q8_0"

