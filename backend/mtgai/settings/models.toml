# MTGAI Model Registry
#
# Defines all available LLM and image-generation models.
# Edit this file to add new models or providers.
# Keys (e.g. [llm.opus]) are short identifiers used in settings profiles.
#
# Local models use the llamacpp provider in managed mode: llmfacade owns a
# llama-swap subprocess that supervises llama-server instances on demand.
# Each local model needs:
#   - gguf_path: absolute path to the .gguf file on disk
#   - context_window: --ctx-size at server launch (also used for budget calcs)
# Optional launch knobs (per-model KV-cache quant, GPU offload):
#   - cache_type_k / cache_type_v: "f16" (default), "q8_0", "q4_0"
#   - n_gpu_layers: number of layers to offload to GPU (-1 / 999 = all)
#   - thinking: "adaptive" (reasoning on via the GGUF chat template) / "disabled"
#   - fit: true (default) launches `--fit on` so llama-server re-fits to VRAM

# ── External LLMs (Anthropic) ────────────────────────────────────────────────

[llm.opus]
name = "Claude Opus 4.6"
provider = "anthropic"
model_id = "claude-opus-4-6"
tier = 3
input_price = 15.00   # per 1M tokens
output_price = 75.00  # per 1M tokens
context_window = 200000
supports_effort = true
supports_vision = true
supports_caching = true

