tier = 0
input_price = 0.00
output_price = 0.00
context_window = 128000
supports_effort = false
supports_vision = true
supports_caching = false

# Best long-context config on 12 GB VRAM per TC-1f: Vlad IQ4_XS + dynamic
# placement. ~346 s for a 58K-token extraction at 128K (2.5x faster than
# pre-flash-attention baseline). Relies on Ollama 0.21+ auto-enabling flash
# attention. q4_0 KV cache would save another ~100 s but requires a global
# OLLAMA_KV_CACHE_TYPE env var - skipped to preserve per-model flexibility.
[llm.gemma4-26b-vram-dynamic]
name = "Gemma 4 26B Vlad IQ4_XS (num_gpu unset for dynamic placement)"
provider = "ollama"
model_id = "vlad-gemma4-26b-dynamic"
tier = 0
input_price = 0.00
output_price = 0.00
context_window = 128000
supports_effort = false
supports_vision = true
supports_caching = false

