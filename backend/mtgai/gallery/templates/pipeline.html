{% extends "base.html" %}

{% block title %}MTGAI Pipeline{% endblock %}
{% block nav_pipeline %}active{% endblock %}

{% block head %}
<style>
  /* Pipeline dashboard styles */
  .pipeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .pipeline-header h1 {
    margin: 0;
    font-size: 1.5rem;
    color: #e0e0e0;
  }
  .pipeline-stats {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  .pipeline-stat {
    text-align: center;
  }
  .pipeline-stat .stat-value {
    font-size: 1.3rem;
    font-weight: bold;
    color: #e0e0e0;
  }
  .pipeline-stat .stat-label {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
  }

  /* Overall progress bar */
  .overall-progress {
    background: #1a1a2e;
    border-radius: 8px;
    height: 8px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .overall-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a9eff, #00d4aa);
    transition: width 0.5s ease;
    border-radius: 8px;
  }

  /* Action buttons */
  .pipeline-actions {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .pipeline-actions .btn {
    padding: 0.5rem 1.25rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-resume {
    background: #00d4aa;
    color: #0a0a1a;
  }
  .btn-resume:hover { background: #00e8bb; }
  .btn-cancel {
    background: #ff4757;
    color: white;
  }
  .btn-cancel:hover { background: #ff6b7a; }
  .btn-retry {
    background: #ffa502;
    color: #0a0a1a;
  }
  .btn-retry:hover { background: #ffb830; }
  .btn-skip {
    background: #555;
    color: #e0e0e0;
  }
  .btn-skip:hover { background: #666; }
  .btn-configure {
    background: #4a9eff;
    color: white;
  }
  .btn-configure:hover { background: #6ab0ff; }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Stage list */
  .stage-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .stage-card {
    background: #16213e;
    border: 1px solid #1a1a3e;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all 0.3s;
  }
  .stage-card.running {
    border-color: #4a9eff;
    box-shadow: 0 0 12px rgba(74, 158, 255, 0.15);
  }
  .stage-card.completed {
    border-color: #00d4aa33;
  }
  .stage-card.paused_for_review {
    border-color: #ffa502;
    box-shadow: 0 0 12px rgba(255, 165, 2, 0.15);
  }
  .stage-card.failed {
    border-color: #ff4757;
  }
  .stage-card.skipped {
    opacity: 0.4;
  }

  /* Stage number */
  .stage-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: bold;
    flex-shrink: 0;
    background: #1a1a2e;
    color: #666;
    border: 2px solid #333;
  }
  .stage-card.completed .stage-num {
    background: #00d4aa;
    color: #0a0a1a;
    border-color: #00d4aa;
  }
  .stage-card.running .stage-num {
    background: #4a9eff;
    color: white;
    border-color: #4a9eff;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .stage-card.paused_for_review .stage-num {
    background: #ffa502;
    color: #0a0a1a;
    border-color: #ffa502;
  }
  .stage-card.failed .stage-num {
    background: #ff4757;
    color: white;
    border-color: #ff4757;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74, 158, 255, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(74, 158, 255, 0); }
  }

  /* Stage info */
  .stage-info {
    flex: 1;
    min-width: 0;
  }
  .stage-name {
    font-weight: 600;
    color: #e0e0e0;
    font-size: 0.9rem;
  }
  .stage-detail {
    font-size: 0.75rem;
    color: #888;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Stage progress bar */
  .stage-progress-bar {
    width: 120px;
    height: 6px;
    background: #1a1a2e;
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .stage-progress-fill {
    height: 100%;
    background: #4a9eff;
    transition: width 0.3s ease;
    border-radius: 3px;
  }

  /* Stage meta (cost, time) */
  .stage-meta {
    display: flex;
    gap: 1rem;
    flex-shrink: 0;
    font-size: 0.75rem;
    color: #888;
  }

  /* Status badge */
  .stage-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .badge-pending { background: #333; color: #888; }
  .badge-running { background: #4a9eff33; color: #4a9eff; }
  .badge-completed { background: #00d4aa22; color: #00d4aa; }
  .badge-paused { background: #ffa50233; color: #ffa502; }
  .badge-failed { background: #ff475733; color: #ff4757; }
  .badge-skipped { background: #33333366; color: #666; }

  /* Review mode indicator */
  .review-indicator {
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 3px;
    background: #ffa50222;
    color: #ffa502;
    margin-left: 0.5rem;
  }

  /* ------- Live phase banner (mirrors theme extractor's banner) ------- */
  .pipeline-phase-banner {
    display: none;
    flex-direction: column;
    gap: 0.35rem;
    margin: 1.5rem 0 1rem 0;
    padding: 0.6rem 0.85rem;
    background: rgba(74, 158, 255, 0.05);
    border: 1px solid rgba(74, 158, 255, 0.18);
    border-radius: 6px;
    font-size: 0.8rem;
    line-height: 1.4;
  }
  .pipeline-phase-banner.active { display: flex; }
  .phase-banner-row {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    align-items: center;
  }
  .phase-activity {
    color: #ddd;
    font-weight: 500;
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .phase-elapsed {
    color: #888;
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .phase-bar {
    height: 4px;
    background: #1a1a2e;
    border-radius: 2px;
    overflow: hidden;
  }
  .phase-bar-fill {
    height: 100%;
    width: 0;
    background: #4a9eff;
    transition: width 0.4s ease;
    border-radius: 2px;
  }
  .phase-bar-fill.indeterminate {
    width: 100%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      #4a9eff 50%,
      transparent 100%
    );
    background-size: 200% 100%;
    animation: phase-stripe 1.4s linear infinite;
  }
  @keyframes phase-stripe {
    0%   { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }
  .phase-stats {
    color: #888;
    font-size: 0.72rem;
    font-variant-numeric: tabular-nums;
    display: none;
  }
  .pipeline-phase-banner.has-stats .phase-stats { display: block; }

  /* ------- Stage section panel (live filling) ------- */
  .stage-sections {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .stage-section-group {
    background: #0f1729;
    border: 1px solid #1a1a3e;
    border-radius: 8px;
    padding: 1rem 1.1rem;
  }
  .stage-section-group h3 {
    margin: 0 0 0.75rem 0;
    color: #e0e0e0;
    font-size: 1rem;
    border-bottom: 1px solid #1f2540;
    padding-bottom: 0.5rem;
  }
  .section {
    margin: 0.6rem 0;
    border-left: 2px solid #1f2540;
    padding: 0.4rem 0.75rem;
    transition: border-color 0.3s;
  }
  .section.running { border-left-color: #4a9eff; }
  .section.done { border-left-color: #00d4aa; }
  .section.failed { border-left-color: #ff4757; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.4rem;
  }
  .section-title {
    color: #e0e0e0;
    font-weight: 600;
    font-size: 0.85rem;
  }
  .section-status {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .section-status.pending { background: #333; color: #888; }
  .section-status.running { background: #4a9eff33; color: #4a9eff; }
  .section-status.done { background: #00d4aa22; color: #00d4aa; }
  .section-status.failed { background: #ff475733; color: #ff4757; }
  .section-detail {
    font-size: 0.75rem;
    color: #888;
    margin-left: auto;
  }
  .section-body { font-size: 0.82rem; color: #d0d0d0; }

  /* Section: kv (definition list) */
  .kv-list {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 0.2rem 1rem;
    margin: 0;
  }
  .kv-list dt { color: #888; font-size: 0.78rem; }
  .kv-list dd { margin: 0; color: #ddd; font-size: 0.82rem; }

  /* Section: table */
  .section-body table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.78rem;
  }
  .section-body th, .section-body td {
    text-align: left;
    padding: 3px 8px;
    border-bottom: 1px solid #1a1a3e;
  }
  .section-body th { color: #aaa; font-weight: 600; }
  .section-body td { color: #ddd; }
  .section-body table.scrollable {
    display: block;
    max-height: 280px;
    overflow: auto;
  }

  /* Section: card grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.6rem;
  }
  .card-tile {
    background: #16213e;
    border: 1px solid #1f2540;
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
    font-size: 0.75rem;
    transition: border-color 0.3s;
  }
  .card-tile.fade-in { animation: tile-pop 0.5s ease; }
  @keyframes tile-pop {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-tile-head {
    display: flex;
    justify-content: space-between;
    gap: 0.4rem;
    align-items: baseline;
    margin-bottom: 0.2rem;
  }
  .card-tile-name { color: #e0e0e0; font-weight: 600; font-size: 0.83rem; }
  .card-tile-cost {
    color: #aaa;
    font-family: ui-monospace, monospace;
    font-size: 0.72rem;
  }
  .card-tile-type { color: #888; font-size: 0.7rem; margin-bottom: 0.3rem; }
  .card-tile-text { color: #ccc; white-space: pre-wrap; line-height: 1.35; }
  .card-tile-flavor {
    color: #888;
    font-style: italic;
    margin-top: 0.3rem;
    font-size: 0.7rem;
  }
  .card-tile-meta { color: #4a9eff; font-size: 0.65rem; margin-top: 0.3rem; }

  /* Section: markdown */
  .md-rendered { color: #d0d0d0; line-height: 1.5; }
  .md-rendered h1, .md-rendered h2, .md-rendered h3 {
    color: #e0e0e0;
    margin: 0.6rem 0 0.3rem;
  }
  .md-rendered ul { padding-left: 1.2rem; margin: 0.3rem 0; }
  .md-rendered code {
    background: #1a1a2e;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 0.78rem;
  }

  .section-empty {
    color: #666;
    font-style: italic;
    font-size: 0.78rem;
  }
</style>
{% endblock %}

{% block content %}
<div id="pipeline-app"></div>

<div class="pipeline-phase-banner" id="pipeline-phase-banner">
  <div class="phase-banner-row">
    <div class="phase-activity" id="pipeline-phase-activity">Working…</div>
    <div class="phase-elapsed" id="pipeline-phase-elapsed">0s</div>
  </div>
  <div class="phase-bar"><div class="phase-bar-fill" id="pipeline-phase-bar"></div></div>
  <div class="phase-stats" id="pipeline-phase-stats"></div>
</div>

<div class="stage-sections" id="stage-sections"></div>
{% endblock %}

{% block scripts %}
<script>
  const PIPELINE_STATE = {{ pipeline_state | safe }};
</script>
<script src="/static/pipeline.js"></script>
{% endblock %}
