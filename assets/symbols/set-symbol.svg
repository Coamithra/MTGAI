<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ASD Set Symbol: Descending Vortex/Spiral — "Anomalous Descent" -->
  <!-- Outer triangular frame pointing down -->
  <path d="M50 8 L88 85 L12 85 Z" fill="none" stroke="#888" stroke-width="3" stroke-linejoin="round"/>
  <!-- Spiral vortex inside — three curved arms converging to a point -->
  <path d="M50 28 Q62 38 58 50 Q54 62 50 72" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 40 Q46 36 50 48 Q54 60 44 68" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M64 40 Q54 36 50 48 Q46 60 56 68" fill="none" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Central anomaly point -->
  <circle cx="50" cy="52" r="3" fill="#888"/>
</svg>
